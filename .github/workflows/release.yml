# Tagged-release builder.
#
# Triggers on `v*` tag push (e.g. `v0.1.0`). Builds the Linux x86_64
# binary, uploads to a private S3 bucket, and updates a public
# `latest.json` manifest the marketing landing page reads to wire
# its "Download for Linux" CTA.
#
# Storage layout in the bucket:
#   binaries/<tag>/journal-app-<tag>-linux-x86_64.tar.gz
#   binaries/<tag>/journal-app-<tag>-linux-x86_64.tar.gz.sha256
#   latest.json     ← always points at the most recent tag's URLs
#
# `latest.json` shape (consumed by web/src/pages/Landing.tsx):
#   {
#     "version": "v0.1.0",
#     "publishedAt": "2026-05-11T00:00:00Z",
#     "platforms": {
#       "linux-x86_64": { "url": "...", "sha256": "..." }
#     }
#   }
#
# Required repo secrets:
#   AWS_RELEASE_ROLE_ARN   IAM role with `s3:PutObject` +
#                          `s3:PutObjectAcl` on the releases bucket
#                          and trust policy allowing GitHub OIDC.
#   AWS_REGION             e.g. `us-east-1`.
#   RELEASES_BUCKET        Bucket name (e.g. `journal-releases-prod`).
#   RELEASES_PUBLIC_URL    Public URL prefix where binaries are served
#                          (e.g. `https://releases.journal.app` if a
#                          CloudFront distro is in front of the bucket,
#                          or the S3 website endpoint).

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # OIDC into AWS
  contents: read

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install GTK4 / libadwaita / GL deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libvulkan-dev \
            libpoppler-glib-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Build journal-app (release)
        run: cargo build --release -p journal-app --features remote,vello

      - name: Strip + tarball
        run: |
          strip target/release/journal-app
          mkdir -p dist
          cp resources/dev.s7k.journal.desktop dist/
          cp resources/icons/dev.s7k.journal.svg dist/
          cp target/release/journal-app dist/
          cp Makefile dist/
          cd dist
          tar czf "journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" \
            journal-app dev.s7k.journal.desktop dev.s7k.journal.svg Makefile
          sha256sum "journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" \
            > "journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload binary + checksum
        env:
          BUCKET: ${{ secrets.RELEASES_BUCKET }}
        run: |
          aws s3 cp \
            "dist/journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" \
            "s3://${BUCKET}/binaries/${GITHUB_REF_NAME}/" \
            --content-type application/gzip \
            --cache-control "max-age=31536000, immutable, public"
          aws s3 cp \
            "dist/journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz.sha256" \
            "s3://${BUCKET}/binaries/${GITHUB_REF_NAME}/" \
            --content-type text/plain \
            --cache-control "max-age=31536000, immutable, public"

      - name: Build + upload latest.json manifest
        env:
          BUCKET: ${{ secrets.RELEASES_BUCKET }}
          PUBLIC_URL: ${{ secrets.RELEASES_PUBLIC_URL }}
        run: |
          ARTIFACT="journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz"
          SHA=$(awk '{print $1}' "dist/${ARTIFACT}.sha256")
          PUBLISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > latest.json <<EOF
          {
            "version": "${GITHUB_REF_NAME}",
            "publishedAt": "${PUBLISHED_AT}",
            "platforms": {
              "linux-x86_64": {
                "url": "${PUBLIC_URL}/binaries/${GITHUB_REF_NAME}/${ARTIFACT}",
                "sha256": "${SHA}",
                "sizeBytes": $(stat -c %s "dist/${ARTIFACT}")
              }
            }
          }
          EOF
          # Short cache TTL — the landing page refetches per visit.
          aws s3 cp latest.json "s3://${BUCKET}/latest.json" \
            --content-type application/json \
            --cache-control "max-age=300, public"

      - name: Summary
        env:
          PUBLIC_URL: ${{ secrets.RELEASES_PUBLIC_URL }}
        run: |
          echo "## Released ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Binary:** [${PUBLIC_URL}/binaries/${GITHUB_REF_NAME}/journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz](${PUBLIC_URL}/binaries/${GITHUB_REF_NAME}/journal-app-${GITHUB_REF_NAME}-linux-x86_64.tar.gz)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Manifest:** ${PUBLIC_URL}/latest.json" >> "$GITHUB_STEP_SUMMARY"
