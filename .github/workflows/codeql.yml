name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          # CodeQL Rust support only ships `build-mode: none` (buildless
          # extraction) today; `manual` errors out with "Rust does not
          # support the manual build mode". The standalone extractor is
          # less precise than tracing extraction, but it's what's
          # available until the codeql-action Rust extractor lands tracing.
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
