<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Notebook body -->
  <rect x="40" y="20" width="120" height="155" rx="6" ry="6"
        fill="none" stroke="currentColor" stroke-width="8"/>
  <!-- Spine binding line -->
  <line x1="68" y1="20" x2="68" y2="175"
        stroke="currentColor" stroke-width="5"/>
  <!-- Binding holes -->
  <circle cx="68" cy="48"  r="5" fill="currentColor"/>
  <circle cx="68" cy="88"  r="5" fill="currentColor"/>
  <circle cx="68" cy="128" r="5" fill="currentColor"/>
  <!-- Ruled lines on page -->
  <line x1="82" y1="65"  x2="148" y2="65"  stroke="currentColor" stroke-width="4"/>
  <line x1="82" y1="85"  x2="148" y2="85"  stroke="currentColor" stroke-width="4"/>
  <line x1="82" y1="105" x2="148" y2="105" stroke="currentColor" stroke-width="4"/>
  <line x1="82" y1="125" x2="130" y2="125" stroke="currentColor" stroke-width="4"/>
  <!-- Pen body (diagonal, bottom-right) -->
  <line x1="120" y1="150" x2="165" y2="105"
        stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
  <!-- Pen tip triangle -->
  <polygon points="120,150 108,178 136,158"
           fill="currentColor"/>
  <!-- Pen clip highlight -->
  <line x1="128" y1="144" x2="158" y2="114"
        stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
