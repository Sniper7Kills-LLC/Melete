app-id: app.melete.Melete
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: melete-app

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-data/melete:create
  - --filesystem=xdg-config/melete:create
  # Network access for the Amplify-backed catalog + remote sync. The
  # `--share=network` finish-arg grants generic outbound TCP / DNS —
  # the Rust client only talks to *.amazonaws.com / our domain so the
  # Flatpak portal still mediates filesystem access.
  - --share=network

# GNOME 47 SDK doesn't ship Rust — the release.yml workflow builds
# melete-app on the host runner (`linux-bin` job) and downloads it as
# an artefact alongside this manifest before invoking flatpak-builder.
# The manifest just bundles the pre-built binary + .desktop + icon.
# Avoids adding a Rust SDK extension (~1 GB) for a build that already
# happened upstream in the matrix.
modules:
  - name: melete-app
    buildsystem: simple
    build-commands:
      - install -Dm755 melete-app /app/bin/melete-app
      - install -Dm644 app.melete.Melete.desktop /app/share/applications/app.melete.Melete.desktop
      - install -Dm644 app.melete.Melete.svg /app/share/icons/hicolor/scalable/apps/app.melete.Melete.svg
    sources:
      - type: file
        path: ../target/release/melete-app
      - type: file
        path: ../resources/app.melete.Melete.desktop
      - type: file
        path: ../resources/icons/app.melete.Melete.svg
