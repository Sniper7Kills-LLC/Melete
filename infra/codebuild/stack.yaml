AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Melete desktop-app build pipeline (Phase 7.5, #43). Provisions:
    - S3 bucket for release artefacts (versioned, AES256).
    - CodeBuild projects per OS (Linux x86_64, macOS arm64, Windows
      x86_64) that build the installer artefacts using the scripts
      already checked into packaging/<os>/.
    - CodeBuild "manifest" project that aggregates SHA256SUMS +
      writes manifest.json + bumps latest.json after the per-OS
      builds complete.
    - GitHub source via aws_codeconnections (manual OAuth handshake
      required post-deploy).
    - IAM service role scoped to CloudWatch Logs + the releases bucket.
    - Tag-push webhook trigger on `v*` (filtered).
    - SNS topic for build-status notifications.

Parameters:
  GitHubRepo:
    Type: String
    Default: Sniper7Kills-LLC/Melete
    Description: GitHub <owner>/<repo>.
  GitHubConnectionArn:
    Type: String
    Description: >
      Existing AWS CodeConnections (GitHub) ARN. Must be in
      AVAILABLE state — CodeBuild refuses references to a
      PENDING_HANDSHAKE connection. Create + finish OAuth before
      deploying the stack:
        aws codeconnections create-connection \\
          --connection-name melete-github \\
          --provider-type GitHub \\
          --profile melete --region us-east-1
      then open the Console → CodeConnections → click through OAuth.
    AllowedPattern: '^arn:aws:codeconnections:[a-z0-9-]+:[0-9]+:connection/[a-f0-9-]+$'
  ReleasesBucketName:
    Type: String
    Default: ''
    Description: >
      Explicit S3 bucket name. Leave blank to auto-generate
      `melete-releases-<account-id>` so the stack can be deployed in
      any account without name collisions.
  NotificationEmail:
    Type: String
    Default: ''
    Description: >
      Subscribed to the SNS topic for build failures. Leave blank to
      skip subscription (topic still created).
  EnableMacOS:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Provision the macOS CodeBuild project. AWS-provided ARM macOS
      compute is preview-tier in most regions/accounts — set to
      `false` until you've requested preview access via AWS Support
      (otherwise the stack fails on project creation).
  HostedZoneId:
    Type: String
    Default: ''
    Description: >
      Route 53 hosted zone ID for the parent domain. Leave blank
      to skip CloudFront + ACM provisioning (bucket stays private,
      no public access — useful for first-deploy smoke tests). When
      set, the stack provisions an ACM cert + CloudFront distribution
      fronting the bucket at `${ReleasesHostname}`.
  ReleasesHostname:
    Type: String
    Default: releases.melete.app
    Description: Public hostname for the releases CDN (only used when HostedZoneId is set).

Conditions:
  HasExplicitBucketName: !Not [!Equals [!Ref ReleasesBucketName, '']]
  HasNotificationEmail:  !Not [!Equals [!Ref NotificationEmail, '']]
  ProvisionMacOS:        !Equals [!Ref EnableMacOS, 'true']
  ProvisionCDN:          !Not [!Equals [!Ref HostedZoneId, '']]

Resources:
  # ─── Storage ─────────────────────────────────────────────────────
  ReleasesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasExplicitBucketName
        - !Ref ReleasesBucketName
        - !Sub 'melete-releases-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      # Private. CloudFront's OAC reads the objects via the bucket
      # policy below; nobody else.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  # ─── CDN (CloudFront + ACM + Route 53) — conditional ─────────────
  # All four resources live behind the `ProvisionCDN` condition so a
  # first-deploy smoke test can skip the cert validation + DNS dance
  # (set HostedZoneId='' to skip). When enabled, the operator must
  # already control the parent domain in Route 53 — ACM issues the
  # cert against DNS records the stack creates inside the existing
  # zone.

  ReleasesCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: ProvisionCDN
    Properties:
      DomainName: !Ref ReleasesHostname
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ReleasesHostname
          HostedZoneId: !Ref HostedZoneId

  ReleasesOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: ProvisionCDN
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'melete-releases-oac-${AWS::AccountId}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ReleasesDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: ProvisionCDN
    DependsOn: ReleasesCertificate
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases:
          - !Ref ReleasesHostname
        ViewerCertificate:
          AcmCertificateArn: !Ref ReleasesCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: ReleasesBucketOrigin
            DomainName: !GetAtt ReleasesBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt ReleasesOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: ReleasesBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # AWS Managed CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        DefaultRootObject: index.html

  ReleasesBucketOacPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: ProvisionCDN
    Properties:
      Bucket: !Ref ReleasesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${ReleasesBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${ReleasesDistribution}'

  ReleasesDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: ProvisionCDN
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ReleasesHostname
      Type: A
      AliasTarget:
        DNSName: !GetAtt ReleasesDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's fixed hosted zone

  # ─── Notifications ───────────────────────────────────────────────
  BuildStatusTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: melete-build-status
      DisplayName: Melete build pipeline status

  BuildStatusSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref BuildStatusTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ─── CodeBuild service role ──────────────────────────────────────
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'melete-codebuild-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/melete-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/melete-*:*'
        - PolicyName: ReleasesBucketReadWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ReleasesBucket.Arn
                  - !Sub '${ReleasesBucket.Arn}/*'
        - PolicyName: SourceConnection
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codeconnections:GetConnectionToken
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action: codeconnections:UseConnection
                Resource: !Ref GitHubConnectionArn
        - PolicyName: PublishStatusToSns
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref BuildStatusTopic

  # ─── Linux build project ─────────────────────────────────────────
  LinuxBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: melete-build-linux
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Source:
        Type: GITHUB
        Location: !Sub 'https://github.com/${GitHubRepo}.git'
        BuildSpec: packaging/linux/buildspec.yml
        Auth:
          Type: CODECONNECTIONS
          Resource: !Ref GitHubConnectionArn
      SourceVersion: refs/heads/main
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PUSH
            - Type: HEAD_REF
              Pattern: ^refs/tags/v.*$
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_LARGE
        PrivilegedMode: true   # Docker-in-Docker for Flatpak builder
        EnvironmentVariables:
          - Name: RELEASES_BUCKET
            Value: !Ref ReleasesBucket
      Artifacts:
        Type: NO_ARTIFACTS
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/melete-build-linux
      TimeoutInMinutes: 60

  # ─── Windows build project ───────────────────────────────────────
  WindowsBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: melete-build-windows
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Source:
        Type: GITHUB
        Location: !Sub 'https://github.com/${GitHubRepo}.git'
        BuildSpec: packaging/windows/buildspec.yml
        Auth:
          Type: CODECONNECTIONS
          Resource: !Ref GitHubConnectionArn
      SourceVersion: refs/heads/main
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PUSH
            - Type: HEAD_REF
              Pattern: ^refs/tags/v.*$
      Environment:
        Type: WINDOWS_SERVER_2022_CONTAINER
        Image: aws/codebuild/windows-base:2022-1.0
        ComputeType: BUILD_GENERAL1_MEDIUM
        EnvironmentVariables:
          - Name: RELEASES_BUCKET
            Value: !Ref ReleasesBucket
      Artifacts:
        Type: NO_ARTIFACTS
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/melete-build-windows
      TimeoutInMinutes: 90

  # ─── macOS build project (preview — conditional) ─────────────────
  MacOSBuild:
    Type: AWS::CodeBuild::Project
    Condition: ProvisionMacOS
    Properties:
      Name: melete-build-macos
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Source:
        Type: GITHUB
        Location: !Sub 'https://github.com/${GitHubRepo}.git'
        BuildSpec: packaging/macos/buildspec.yml
        Auth:
          Type: CODECONNECTIONS
          Resource: !Ref GitHubConnectionArn
      SourceVersion: refs/heads/main
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PUSH
            - Type: HEAD_REF
              Pattern: ^refs/tags/v.*$
      Environment:
        Type: MAC_ARM
        Image: aws/codebuild/macos-arm-base:14
        ComputeType: BUILD_GENERAL1_LARGE
        EnvironmentVariables:
          - Name: RELEASES_BUCKET
            Value: !Ref ReleasesBucket
      Artifacts:
        Type: NO_ARTIFACTS
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/melete-build-macos
      TimeoutInMinutes: 60

  # ─── Manifest aggregator ─────────────────────────────────────────
  # Triggered manually after the per-OS builds finish (V1). A future
  # iteration adds an S3-event-driven Lambda that fires this once all
  # expected artefacts have landed for the version.
  ManifestBuild:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: melete-build-manifest
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Source:
        Type: GITHUB
        Location: !Sub 'https://github.com/${GitHubRepo}.git'
        BuildSpec: packaging/manifest/buildspec.yml
        Auth:
          Type: CODECONNECTIONS
          Resource: !Ref GitHubConnectionArn
      SourceVersion: refs/heads/main
      Environment:
        Type: LINUX_CONTAINER
        Image: aws/codebuild/standard:7.0
        ComputeType: BUILD_GENERAL1_SMALL
        EnvironmentVariables:
          - Name: RELEASES_BUCKET
            Value: !Ref ReleasesBucket
      Artifacts:
        Type: NO_ARTIFACTS
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/melete-build-manifest
      TimeoutInMinutes: 15

Outputs:
  ReleasesBucketName:
    Description: S3 bucket holding release artefacts + manifests.
    Value: !Ref ReleasesBucket
    Export:
      Name: !Sub '${AWS::StackName}-ReleasesBucket'
  GitHubConnectionArn:
    Description: CodeConnections ARN supplied at deploy time.
    Value: !Ref GitHubConnectionArn
  BuildStatusTopicArn:
    Description: Subscribe additional endpoints to this SNS topic for build alerts.
    Value: !Ref BuildStatusTopic
  LinuxBuildName:
    Value: !Ref LinuxBuild
  WindowsBuildName:
    Value: !Ref WindowsBuild
  MacOSBuildName:
    Condition: ProvisionMacOS
    Value: !Ref MacOSBuild
  ManifestBuildName:
    Value: !Ref ManifestBuild
  ReleasesPublicUrl:
    Condition: ProvisionCDN
    Description: HTTPS URL for downloads.
    Value: !Sub 'https://${ReleasesHostname}'
  ReleasesCloudFrontDomain:
    Condition: ProvisionCDN
    Description: >
      The distribution's CloudFront-side hostname. If the DNS A-record
      ever drops, point the user-facing CNAME here as a recovery path.
    Value: !GetAtt ReleasesDistribution.DomainName
