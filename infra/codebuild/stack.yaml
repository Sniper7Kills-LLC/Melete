AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Melete desktop-app build pipeline (Phase 7.5, #43). Provisions:
    - S3 bucket for release artefacts (versioned, AES256).
    - CodeBuild projects per OS (Linux x86_64, macOS arm64, Windows
      x86_64) that build the installer artefacts using the scripts
      already checked into packaging/<os>/.
    - CodeBuild "manifest" project that aggregates SHA256SUMS +
      writes manifest.json + bumps latest.json after the per-OS
      builds complete.
    - GitHub source via aws_codeconnections (manual OAuth handshake
      required post-deploy).
    - IAM service role scoped to CloudWatch Logs + the releases bucket.
    - Tag-push webhook trigger on `v*` (filtered).
    - SNS topic for build-status notifications.

Parameters:
  GitHubRepo:
    Type: String
    Default: Sniper7Kills-LLC/Melete
    Description: GitHub <owner>/<repo>.
  ReleasesBucketName:
    Type: String
    Default: ''
    Description: >
      Explicit S3 bucket name. Leave blank to auto-generate
      `melete-releases-<account-id>` so the stack can be deployed in
      any account without name collisions.
  NotificationEmail:
    Type: String
    Default: ''
    Description: >
      Subscribed to the SNS topic for build failures. Leave blank to
      skip subscription (topic still created).
  EnableMacOS:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Provision the macOS CodeBuild project. AWS-provided ARM macOS
      compute is preview-tier in most regions/accounts — set to
      `false` until you've requested preview access via AWS Support
      (otherwise the stack fails on project creation).
  HostedZoneId:
    Type: String
    Default: ''
    Description: >
      Route 53 hosted zone ID for the parent domain. Leave blank
      to skip CloudFront + ACM provisioning (bucket stays private,
      no public access — useful for first-deploy smoke tests). When
      set, the stack provisions an ACM cert + CloudFront distribution
      fronting the bucket at `${ReleasesHostname}`.
  ReleasesHostname:
    Type: String
    Default: releases.melete.app
    Description: Public hostname for the releases CDN (only used when HostedZoneId is set).

Conditions:
  HasExplicitBucketName: !Not [!Equals [!Ref ReleasesBucketName, '']]
  HasNotificationEmail:  !Not [!Equals [!Ref NotificationEmail, '']]
  ProvisionMacOS:        !Equals [!Ref EnableMacOS, 'true']
  ProvisionCDN:          !Not [!Equals [!Ref HostedZoneId, '']]

Resources:
  # ─── Storage ─────────────────────────────────────────────────────
  ReleasesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasExplicitBucketName
        - !Ref ReleasesBucketName
        - !Sub 'melete-releases-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      # Private. CloudFront's OAC reads the objects via the bucket
      # policy below; nobody else.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  # ─── CDN (CloudFront + ACM + Route 53) — conditional ─────────────
  # All four resources live behind the `ProvisionCDN` condition so a
  # first-deploy smoke test can skip the cert validation + DNS dance
  # (set HostedZoneId='' to skip). When enabled, the operator must
  # already control the parent domain in Route 53 — ACM issues the
  # cert against DNS records the stack creates inside the existing
  # zone.

  ReleasesCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: ProvisionCDN
    Properties:
      DomainName: !Ref ReleasesHostname
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref ReleasesHostname
          HostedZoneId: !Ref HostedZoneId

  ReleasesOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: ProvisionCDN
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'melete-releases-oac-${AWS::AccountId}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ReleasesDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: ProvisionCDN
    DependsOn: ReleasesCertificate
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Aliases:
          - !Ref ReleasesHostname
        ViewerCertificate:
          AcmCertificateArn: !Ref ReleasesCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: ReleasesBucketOrigin
            DomainName: !GetAtt ReleasesBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt ReleasesOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: ReleasesBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # AWS Managed CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        DefaultRootObject: index.html

  ReleasesBucketOacPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: ProvisionCDN
    Properties:
      Bucket: !Ref ReleasesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${ReleasesBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${ReleasesDistribution}'

  ReleasesDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: ProvisionCDN
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref ReleasesHostname
      Type: A
      AliasTarget:
        DNSName: !GetAtt ReleasesDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's fixed hosted zone

  # ─── Notifications ───────────────────────────────────────────────
  BuildStatusTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: melete-build-status
      DisplayName: Melete build pipeline status

  BuildStatusSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref BuildStatusTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ─── CodeBuild service role ──────────────────────────────────────
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'melete-codebuild-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/melete-*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/melete-*:*'
        - PolicyName: ReleasesBucketReadWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ReleasesBucket.Arn
                  - !Sub '${ReleasesBucket.Arn}/*'
        - PolicyName: PublishStatusToSns
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref BuildStatusTopic

  # ─── Bootstrap Lambda + custom resource ──────────────────────────
  # CloudFormation's `AWS::CodeBuild::Project` resource rejects
  # CODECONNECTIONS-backed GitHub sources with `OAuthProviderException`
  # when the deploy principal is a cross-account assumed role
  # (`OrganizationAccountAccessRole`). Confirmed against
  # ~/Desktop/EAM/infra/whisper-image-pipeline/README.md which hit
  # the identical AWS-side interaction. Direct `aws codebuild create-
  # project` CLI calls from a local-account principal succeed.
  #
  # Workaround: a Lambda function (execution role = local-account
  # principal) creates each CodeBuild project via boto3. Each project
  # is registered as a `Custom::CodeBuildProject` resource so CFN's
  # create/update/delete lifecycle still works — Lambda just becomes
  # the executor.

  BootstrapLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'melete-codebuild-bootstrap-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ManageCodeBuildProjects
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:CreateProject
                  - codebuild:UpdateProject
                  - codebuild:DeleteProject
                  - codebuild:BatchGetProjects
                  - codebuild:CreateWebhook
                  - codebuild:DeleteWebhook
                  - codebuild:UpdateWebhook
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/melete-*'
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CodeBuildServiceRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: codebuild.amazonaws.com

  BootstrapLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: melete-codebuild-bootstrap
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BootstrapLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          # CFN custom resource: provisions a CodeBuild project via
          # boto3.codebuild.create_project / update_project /
          # delete_project. Bypasses the
          # CFN-AWS::CodeBuild::Project+CodeConnections quirk that
          # rejects cross-account-assumed-role deploys.

          import json
          import os
          import urllib.request
          import boto3

          codebuild = boto3.client('codebuild')

          def handle_webhook(event, props, request_type, project):
              filter_groups = json.loads(props['FilterGroups'])
              if request_type == 'Create':
                  codebuild.create_webhook(projectName=project, filterGroups=filter_groups)
              elif request_type == 'Update':
                  codebuild.update_webhook(projectName=project, filterGroups=filter_groups, rotateSecret=False)
              elif request_type == 'Delete':
                  try:
                      codebuild.delete_webhook(projectName=project)
                  except codebuild.exceptions.ResourceNotFoundException:
                      pass

          def respond(event, status, physical_id, data=None, reason=''):
              body = {
                  'Status': status,
                  'Reason': reason or ('See CloudWatch logs ' + os.environ.get('AWS_LAMBDA_LOG_STREAM_NAME', '')),
                  'PhysicalResourceId': physical_id,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {},
              }
              req = urllib.request.Request(
                  event['ResponseURL'],
                  data=json.dumps(body).encode('utf-8'),
                  method='PUT',
                  headers={'content-type': '', 'content-length': str(len(json.dumps(body)))},
              )
              urllib.request.urlopen(req)

          def build_project_input(props):
              # `Project` is a JSON-encoded boto3 create_project payload.
              # Stored as a string in the custom resource Properties
              # because CFN's intrinsic functions need a single value
              # type; the Lambda decodes it back to a dict here.
              return json.loads(props['Project'])

          def handler(event, context):
              print('event:', json.dumps(event))
              try:
                  request_type = event['RequestType']
                  props = event['ResourceProperties']
                  action = props.get('Action', 'project')   # 'project' or 'webhook'

                  if action == 'webhook':
                      project = props['ProjectName']
                      handle_webhook(event, props, request_type, project)
                      respond(event, 'SUCCESS', f'{project}-webhook')
                      return

                  # default: project
                  name = props['Name']

                  if request_type == 'Create':
                      payload = build_project_input(props)
                      payload['name'] = name
                      codebuild.create_project(**payload)
                      respond(event, 'SUCCESS', name)
                      return

                  if request_type == 'Update':
                      payload = build_project_input(props)
                      payload['name'] = name
                      codebuild.update_project(**payload)
                      respond(event, 'SUCCESS', name)
                      return

                  if request_type == 'Delete':
                      try:
                          codebuild.delete_project(name=name)
                      except codebuild.exceptions.ResourceNotFoundException:
                          pass
                      respond(event, 'SUCCESS', name)
                      return

                  respond(event, 'FAILED', name, reason=f'Unknown RequestType {request_type}')

              except Exception as e:
                  print('error:', repr(e))
                  respond(event, 'FAILED', event.get('PhysicalResourceId') or 'unknown',
                          reason=str(e))

  # ─── Linux build project (custom resource) ───────────────────────
  LinuxBuild:
    Type: Custom::CodeBuildProject
    Properties:
      ServiceToken: !GetAtt BootstrapLambda.Arn
      Name: melete-build-linux
      Project: !Sub |
        {
          "description": "Melete Linux x86_64 installers (deb/rpm/AppImage/Arch/Flatpak)",
          "source": {
            "type": "GITHUB",
            "location": "https://github.com/${GitHubRepo}.git",
            "buildspec": "packaging/linux/buildspec.yml"
          },
          "sourceVersion": "refs/heads/main",
          "artifacts": { "type": "NO_ARTIFACTS" },
          "environment": {
            "type": "LINUX_CONTAINER",
            "image": "aws/codebuild/standard:7.0",
            "computeType": "BUILD_GENERAL1_LARGE",
            "privilegedMode": true,
            "environmentVariables": [
              { "name": "RELEASES_BUCKET", "value": "${ReleasesBucket}", "type": "PLAINTEXT" }
            ]
          },
          "serviceRole": "${CodeBuildServiceRole.Arn}",
          "logsConfig": {
            "cloudWatchLogs": { "status": "ENABLED", "groupName": "/aws/codebuild/melete-build-linux" }
          },
          "timeoutInMinutes": 60
        }

  # ─── Windows build project ───────────────────────────────────────
  WindowsBuild:
    Type: Custom::CodeBuildProject
    Properties:
      ServiceToken: !GetAtt BootstrapLambda.Arn
      Name: melete-build-windows
      Project: !Sub |
        {
          "description": "Melete Windows x86_64 MSI + portable zip (unsigned)",
          "source": {
            "type": "GITHUB",
            "location": "https://github.com/${GitHubRepo}.git",
            "buildspec": "packaging/windows/buildspec.yml"
          },
          "sourceVersion": "refs/heads/main",
          "artifacts": { "type": "NO_ARTIFACTS" },
          "environment": {
            "type": "WINDOWS_SERVER_2022_CONTAINER",
            "image": "aws/codebuild/windows-base:2022-1.0",
            "computeType": "BUILD_GENERAL1_MEDIUM",
            "environmentVariables": [
              { "name": "RELEASES_BUCKET", "value": "${ReleasesBucket}", "type": "PLAINTEXT" }
            ]
          },
          "serviceRole": "${CodeBuildServiceRole.Arn}",
          "logsConfig": {
            "cloudWatchLogs": { "status": "ENABLED", "groupName": "/aws/codebuild/melete-build-windows" }
          },
          "timeoutInMinutes": 90
        }

  # ─── macOS build project (preview — conditional) ─────────────────
  MacOSBuild:
    Type: Custom::CodeBuildProject
    Condition: ProvisionMacOS
    Properties:
      ServiceToken: !GetAtt BootstrapLambda.Arn
      Name: melete-build-macos
      Project: !Sub |
        {
          "description": "Melete macOS arm64 .app + DMG (unsigned)",
          "source": {
            "type": "GITHUB",
            "location": "https://github.com/${GitHubRepo}.git",
            "buildspec": "packaging/macos/buildspec.yml"
          },
          "sourceVersion": "refs/heads/main",
          "artifacts": { "type": "NO_ARTIFACTS" },
          "environment": {
            "type": "MAC_ARM",
            "image": "aws/codebuild/macos-arm-base:14",
            "computeType": "BUILD_GENERAL1_LARGE",
            "environmentVariables": [
              { "name": "RELEASES_BUCKET", "value": "${ReleasesBucket}", "type": "PLAINTEXT" }
            ]
          },
          "serviceRole": "${CodeBuildServiceRole.Arn}",
          "logsConfig": {
            "cloudWatchLogs": { "status": "ENABLED", "groupName": "/aws/codebuild/melete-build-macos" }
          },
          "timeoutInMinutes": 60
        }

  # CodeBuild auto-webhook registration requires CODECONNECTIONS auth
  # on the project's source, which this account hits an unresolvable
  # AWS-side `OAuthProviderException` on (reproduced via both
  # OrganizationAccountAccessRole and Lambda execution-role principals).
  # Sidestep entirely — anonymous public-repo source pulls work, and
  # tag-triggered builds run via `aws codebuild start-build` from
  # either the manual workflow or a future EventBridge bridge.

  # ─── Manifest aggregator ─────────────────────────────────────────
  # Triggered manually after the per-OS builds finish (V1). A future
  # iteration adds an S3-event-driven Lambda that fires this once all
  # expected artefacts have landed for the version.
  ManifestBuild:
    Type: Custom::CodeBuildProject
    Properties:
      ServiceToken: !GetAtt BootstrapLambda.Arn
      Name: melete-build-manifest
      Project: !Sub |
        {
          "description": "Aggregates SHA256SUMS + manifest.json + latest.json after per-OS builds finish",
          "source": {
            "type": "GITHUB",
            "location": "https://github.com/${GitHubRepo}.git",
            "buildspec": "packaging/manifest/buildspec.yml"
          },
          "sourceVersion": "refs/heads/main",
          "artifacts": { "type": "NO_ARTIFACTS" },
          "environment": {
            "type": "LINUX_CONTAINER",
            "image": "aws/codebuild/standard:7.0",
            "computeType": "BUILD_GENERAL1_SMALL",
            "environmentVariables": [
              { "name": "RELEASES_BUCKET", "value": "${ReleasesBucket}", "type": "PLAINTEXT" }
            ]
          },
          "serviceRole": "${CodeBuildServiceRole.Arn}",
          "logsConfig": {
            "cloudWatchLogs": { "status": "ENABLED", "groupName": "/aws/codebuild/melete-build-manifest" }
          },
          "timeoutInMinutes": 15
        }

Outputs:
  ReleasesBucketName:
    Description: S3 bucket holding release artefacts + manifests.
    Value: !Ref ReleasesBucket
    Export:
      Name: !Sub '${AWS::StackName}-ReleasesBucket'
  BuildStatusTopicArn:
    Description: Subscribe additional endpoints to this SNS topic for build alerts.
    Value: !Ref BuildStatusTopic
  LinuxBuildName:
    Value: !Ref LinuxBuild
  WindowsBuildName:
    Value: !Ref WindowsBuild
  MacOSBuildName:
    Condition: ProvisionMacOS
    Value: !Ref MacOSBuild
  ManifestBuildName:
    Value: !Ref ManifestBuild
  ReleasesPublicUrl:
    Condition: ProvisionCDN
    Description: HTTPS URL for downloads.
    Value: !Sub 'https://${ReleasesHostname}'
  ReleasesCloudFrontDomain:
    Condition: ProvisionCDN
    Description: >
      The distribution's CloudFront-side hostname. If the DNS A-record
      ever drops, point the user-facing CNAME here as a recovery path.
    Value: !GetAtt ReleasesDistribution.DomainName
